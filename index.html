<html lang="en">

<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />

<style>

  html, body, #root { margin: 0; padding: 0; min-height: 100%; background: #F0F0ED; }

  * { box-sizing: border-box; }

<body>
<div id="root"></div>
<pre id="err"></pre>
<script>
window.addEventListener('error', (e) => {
  const err = document.getElementById('err');
  if (err) { err.style.display = 'block'; err.textContent = (e.message || e.error?.message || 'unknown error') + '\n' + (e.error?.stack || ''); }
});
</script>
